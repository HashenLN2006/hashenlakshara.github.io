<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Portfolio</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;

  background: url('background.jpg') no-repeat center center/cover;

  min-height:100vh;
  color:white;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:40px 20px;

  overflow-x:hidden;
  position:relative;
}

/* Dark Overlay */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.back{
      display:inline-block;
      margin-bottom:30px;
      text-decoration:none;
      color:#fff;
      background:#f7b733;
      padding:12px 24px;
      border-radius:10px;
      font-weight:600;
      color:#000;
    }
.fuck{
  padding: 50px;
}    

/* Title */
h1{
  font-size:55px;
  margin-bottom:15px;

  color:#ff4fd8;

  text-shadow:0 0 15px rgba(255,79,216,0.8);
}

.subtitle{
  font-size:20px;
  color:#ddd;
  margin-bottom:45px;
}

/* Gallery */
.gallery{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  justify-content:center;
}

/* Video Card */
.video-card{
  width:280px;

  background:rgba(15,23,42,0.75);

  border-radius:20px;

  padding:12px;

  cursor:pointer;

  transition:0.4s ease;

  backdrop-filter:blur(8px);

  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.video-card:hover{
  transform:translateY(-8px) scale(1.03);

  box-shadow:0 0 25px rgba(255,0,170,0.5);
}

/* Video Preview */
.video-card video{
  width:100%;
  border-radius:14px;
}

/* Text */
.video-card p{
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
}

/* Modal */
.modal{
  display:none;

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.9);

  justify-content:center;
  align-items:center;

  z-index:999;
}

.modal-content{
  width:75%;
  max-width:900px;

  position:relative;
}

.modal-content video{
  width:100%;
  border-radius:15px;

  box-shadow:0 0 30px rgba(255,0,170,0.5);
}

/* Close Button */
.close{
  position:absolute;

  right:0;
  top:-45px;

  font-size:42px;

  cursor:pointer;

  color:white;
}

.close:hover{
  color:#ff4fd8;
}
.back{
      display:inline-block;
      margin-bottom:40px;
      text-decoration:none;
      color:#fff;
      background:#f7b733;
      padding:12px 24px;
      border-radius:10px;
      font-weight:600;
      color:#000;}

</style>
</head>

<script>

function openModal(videoSrc){

  document.getElementById("modal").style.display = "flex";

  document.getElementById("videoPlayer").src = videoSrc;
}

function closeModal(e){

  if(
    e.target.id === "modal" ||
    e.target.className === "close"
  ){

    document.getElementById("modal").style.display = "none";

    document.getElementById("videoPlayer").pause();

    document.getElementById("videoPlayer").src = "";
  }
}

</script>
