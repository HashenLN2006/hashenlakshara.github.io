<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Watch Poster Designs</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#020817;
      color:#fff;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
      padding:80px 0;
    }

    h1{
      text-align:center;
      margin-bottom:50px;
      font-size:48px;
      color:#f7b733;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .gallery img{
      width:100%;
      border-radius:18px;
      transition:0.4s;
      cursor:pointer;
      border:2px solid rgba(255,255,255,0.08);
    }

    .gallery img:hover{
      transform:scale(1.05);
      border-color:#f7b733;
    }

    .back{
      display:inline-block;
      margin-bottom:40px;
      text-decoration:none;
      color:#fff;
      background:#f7b733;
      padding:12px 24px;
      border-radius:10px;
      font-weight:600;
      color:#000;
    }

  </style>
</head>
<body>

  <div class="container">

    <a href="index.html" class="back">
      ← Back To Home
    </a>

    <h1>Watch Poster Designs</h1>

    <div class="gallery">

      <img src="images/421.jpg">
      <img src="images/ChatGPT Image Feb 18, 2026, 10_14_58 AM.png">
      <img src="images/ChatGPT Image Feb 20, 2026, 11_09_02 AM.png">
      <img src="images/Post 2.jpg">
      <img src="images/POSTER 117.jpg">
      <img src="images/POSTER 121.jpg">
      <img src="images/Screenshot 2026-02-20 184959.png" alt="">
      <img src="images/Video Editing.png" alt="">
      <img src="images/YNM 6.jpg" alt="">
      <img src="images/YNM 7.jpg" alt="">

    </div>

  </div>

</body>
</html>
